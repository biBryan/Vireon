<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vireon</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/motion.css">
    <link rel="stylesheet" href="css/sidebar.css?v=9.2">
</head>
<body id="system-body">

    <!-- Background Architecture -->
    <div class="bg-layer bg-ambient"></div>

    <!-- System Interface -->
    <main class="system-container">
        <section class="interface-surface" id="ui-surface">

            <div class="vireon-logo-container">
                <svg class="vireon-wordmark" viewBox="0 0 540 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="vireon-silver" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="540" y2="100">
                            <stop offset="0%" stop-color="#ffffff"/>
                            <stop offset="35%" stop-color="#9aa4b5"/>
                            <stop offset="65%" stop-color="#ffffff"/>
                            <stop offset="100%" stop-color="#606a78"/>
                        </linearGradient>
                    </defs>
                    <g fill="none" stroke="url(#vireon-silver)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
                        <!-- V: Geometría abierta en la base, estilo Azonix -->
                        <path d="M 35,25 L 55,75" />
                        <path d="M 85,25 L 65,75" />
                        
                        <!-- I: Pilar tecnológico con corte superior -->
                        <path d="M 130,35 L 130,85" />
                        <circle cx="130" cy="22" r="1.5" fill="url(#vireon-silver)" stroke="none" />
                        
                        <!-- R: Estructura modular con pierna técnica -->
                        <path d="M 175,25 V 85" />
                        <path d="M 175,25 H 205 C 220,25 220,50 205,50 H 175" />
                        <path d="M 195,50 L 220,85" />
                        
                        <!-- E: Brazos geométricos paralelos -->
                        <path d="M 270,25 V 85" />
                        <path d="M 270,25 H 315" />
                        <path d="M 270,55 H 305" />
                        <path d="M 270,85 H 315" />
                        
                        <!-- O: Anillo modular con cortes de stencil -->
                        <path d="M 380,25 A 30,30 0 1,0 380,85" />
                        <path d="M 380,25 A 30,30 0 0,1 410,55" />
                        <path d="M 410,65 A 30,30 0 0,1 380,85" />
                        
                        <!-- N: Diagonal agresiva y pilares asimétricos -->
                        <path d="M 460,85 V 25" />
                        <path d="M 460,25 L 515,85" />
                        <path d="M 515,85 V 25" />
                    </g>
                </svg>
            </div>

            <!-- Historial Visible -->
            <div class="history-container" id="history-container"></div>

            <!-- Processing Scan Bar -->
            <div class="processing-stage" id="processing-stage" aria-hidden="true">
                <div class="processing-bar">
                    <div class="processing-fill" id="processing-fill"></div>
                </div>
            </div>

            <!-- Thought Anatomy -->
            <div class="thought-anatomy" id="thought-anatomy" aria-live="polite">
                <div class="anatomy-rows" id="anatomy-rows"></div>

                <!-- Synthesis point — the fold between analysis and output -->
                <div class="synthesis-separator" id="synthesis-sep"></div>

                <!-- Prompt Output Block -->
                <div class="prompt-output" id="prompt-output" title="Click para copiar">
                    <div class="prompt-header">
                        <span class="prompt-label">RESPUESTA</span>
                        <span class="copy-hint" id="copy-hint">COPIAR</span>
                    </div>
                    <div class="prompt-text" id="prompt-text"></div>
                    <div class="prompt-timestamp" id="prompt-timestamp"></div>
                </div>
            </div>

            <!-- Status bar (Relocated above input) -->
            <div class="status-container" id="status-container">
                <span class="status-dot" id="status-dot"></span>
                <span id="system-status">Sistema en reposo</span>
            </div>

            <!-- Input Portal (Ahora abajo de todo) -->
            <div class="input-portal" id="input-container">
                <div class="portal-corner tl"></div>
                <div class="portal-corner tr"></div>
                <div class="portal-corner bl"></div>
                <div class="portal-corner br"></div>

                <input type="text"
                       class="main-input"
                       id="system-input"
                       placeholder="Inicia la secuencia..."
                       autocomplete="off">
            </div>
        </section>
    </main>

    <!-- Logic Layer — load order: system → api → cache → engine → markdown → output → commands → interactions -->
    <script src="js/system.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/markdown.js"></script>
    <script src="js/output.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/interactions.js"></script>

</body>
</html>
